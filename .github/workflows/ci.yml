name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run tests
        run: go test ./... -v -race -count=1
      - name: Coverage
        run: go test ./... -coverprofile=coverage.out
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build Windows agent
        run: go build -o bin/fyi-agent.exe ./cmd/fyi-agent/windows/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fyi-agent-windows
          path: bin/fyi-agent.exe

  build-darwin:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build macOS agent
        run: go build -o bin/fyi-agent-darwin ./cmd/fyi-agent/darwin/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fyi-agent-darwin
          path: bin/fyi-agent-darwin
